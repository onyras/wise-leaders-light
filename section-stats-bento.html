<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLF - Stats Bento Section</title>
    <style>
        /* Fonts */
        @font-face {
            font-family: 'Crimson Pro';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url(https://fonts.gstatic.com/s/crimsonpro/v28/q5uDsoa5M_tv7IihmnkabARboYF6CsKj.woff2) format('woff2');
        }
        @font-face {
            font-family: 'DM Sans';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url(https://fonts.gstatic.com/s/dmsans/v17/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2) format('woff2');
        }
        @font-face {
            font-family: 'DM Sans';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url(https://fonts.gstatic.com/s/dmsans/v17/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2) format('woff2');
        }

        :root {
            --color-black: #000000;
            --color-white: #FFFFFF;
            --color-blue: #7FABC8;
            --color-green: #A6BEA4;
            --color-orange: #E08F6A;
            --color-off-white: #F7F3ED;
            --color-card: #EFEBE5;
            --font-serif: 'Crimson Pro', Georgia, serif;
            --font-sans: 'DM Sans', system-ui, sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            background: var(--color-off-white);
        }

        /* Stats Bento */
        .stats {
            background: var(--color-off-white);
            padding: 40px 40px 100px;
        }

        .stats__container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: var(--color-card);
            border-radius: 20px;
            padding: 40px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            transform: translateY(30px);
            animation: card-in 0.8s ease forwards;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .stat__icon {
            width: 48px;
            height: 48px;
            background: rgba(127, 171, 200, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat__icon svg {
            width: 24px;
            height: 24px;
            color: var(--color-blue);
        }

        .stat__content {
            margin-top: auto;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes card-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .stat__number {
            font-family: var(--font-serif);
            font-size: 72px;
            font-weight: 400;
            color: var(--color-black);
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -0.03em;
        }

        .stat__number span {
            color: var(--color-blue);
        }

        .stat__label {
            font-family: var(--font-sans);
            font-size: 17px;
            font-weight: 500;
            color: var(--color-black);
            line-height: 1.4;
        }

        .stat__sublabel {
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.45);
            margin-top: 6px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .stats { padding: 30px 24px 80px; }
            .stats__container { gap: 16px; }
            .stat-card { 
                padding: 32px; 
                min-height: 240px;
            }
            .stat__number { font-size: 56px; }
            .stat__label { font-size: 15px; }
        }

        @media (max-width: 700px) {
            .stats__container {
                grid-template-columns: 1fr;
                max-width: 400px;
            }
            .stat-card { 
                min-height: 220px;
                padding: 36px;
            }
            .stat__number { font-size: 64px; }
            .stat__label { font-size: 16px; }
        }
    </style>
</head>
<body>
    <section class="stats">
        <div class="stats__container">
            <div class="stat-card">
                <div class="stat__icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                </div>
                <div class="stat__content">
                    <div class="stat__number">350<span>+</span></div>
                    <div class="stat__label">Health markers measured</div>
                    <div class="stat__sublabel">via Be-Sapiens diagnostics</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat__icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
                        <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
                    </svg>
                </div>
                <div class="stat__content">
                    <div class="stat__number">30<span>%</span></div>
                    <div class="stat__label">Less negative self-talk</div>
                    <div class="stat__sublabel">reported by alumni</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat__icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div class="stat__content">
                    <div class="stat__number">40<span>%</span></div>
                    <div class="stat__label">Perceived as better leaders</div>
                    <div class="stat__sublabel">by their teams</div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
